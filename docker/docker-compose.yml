version: "3.9"

services:
  # MongoDB
  mongodb:
    image: mongo:7.0
    container_name: pulseHR_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: pulseHR
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo/init.js:/docker-entrypoint-initdb.d/init.js
    networks:
      - pulseHR_network

  # Redis
  redis:
    image: redis:7.2-alpine
    container_name: pulseHR_redis
    restart: unless-stopped
    command: redis-server --requirepass redispassword
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - pulseHR_network

  # Backend API
  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: pulseHR_server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://admin:password@mongodb:27017/pulseHR?authSource=admin
      REDIS_URL: redis://:redispassword@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - redis
    networks:
      - pulseHR_network

  # ML Service
  ml-service:
    build:
      context: ../ml-service
      dockerfile: Dockerfile
    container_name: pulseHR_ml
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      PORT: 8000
    ports:
      - "8000:8000"
    networks:
      - pulseHR_network

  # Frontend
  client:
    build:
      context: ../client
      dockerfile: Dockerfile
    container_name: pulseHR_client
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://server:5000/api
      NEXT_PUBLIC_ML_API_URL: http://ml-service:8000
    ports:
      - "3000:3000"
    depends_on:
      - server
    networks:
      - pulseHR_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: pulseHR_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - client
      - server
    networks:
      - pulseHR_network

volumes:
  mongodb_data:
  redis_data:

networks:
  pulseHR_network:
    driver: bridge
